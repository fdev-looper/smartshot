<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartShot — History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --surface2:  #f0ede8;
      --border:    #e4dfd8;
      --text:      #1c1917;
      --muted:     #78716c;
      --muted2:    #a8a29e;
      --accent:    #0d9488;
      --accent-bg: #f0fdfb;
      --amber:     #d97706;
      --amber-bg:  #fffbeb;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
      --red-border:rgba(220,38,38,0.25);
      --pin:       #d97706;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ---- topbar ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      transition: color 0.15s;
    }

    .back-btn:hover { color: var(--accent); }
    .back-btn svg { width: 14px; height: 14px; }

    .topbar-right { display: flex; gap: 7px; }

    .top-btn {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .top-btn:hover { color: var(--text); border-color: var(--muted2); }
    .top-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .top-btn svg { width: 12px; height: 12px; }

    /* ---- heading ---- */
    .page-head { margin-bottom: 18px; }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 2px;
    }

    .page-sub { font-size: 12px; color: var(--muted2); }

    /* ---- tabs ---- */
    .tabs {
      display: flex;
      gap: 3px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      width: fit-content;
      margin-bottom: 16px;
    }

    .tab {
      padding: 6px 16px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      background: none;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .tab svg { width: 12px; height: 12px; }

    .tab-count {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 8px;
      background: rgba(0,0,0,0.06);
      color: inherit;
    }

    .tab.active .tab-count { background: rgba(255,255,255,0.25); }

    /* ---- stats strip ---- */
    .stats-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 13px;
      font-size: 11px;
      color: var(--muted);
    }

    .stat-pill strong {
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      display: block;
      line-height: 1.2;
      margin-bottom: 1px;
    }

    /* ---- search ---- */
    .search-row {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      color: var(--muted2);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 8px 12px 8px 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted2); }

    #filterSelect {
      padding: 8px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
    }

    .reset-btn {
      padding: 8px 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }

    .reset-btn:hover { color: var(--text); }

    /* ---- results info ---- */
    .results-info {
      font-size: 11px;
      color: var(--muted2);
      margin-bottom: 8px;
      min-height: 16px;
    }

    /* ---- item cards ---- */
    #itemList { display: flex; flex-direction: column; gap: 5px; }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 15px;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      transition: border-color 0.15s;
    }

    .item-card:hover { border-color: var(--muted2); }

    .item-card.pinned {
      border-color: rgba(217,119,6,0.35);
      background: #fffdf7;
    }

    .item-card.is-deleted {
      border-color: var(--red-border);
      background: #fffafa;
    }

    .type-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .type-icon.screenshot { background: var(--accent-bg); border: 1px solid rgba(13,148,136,0.15); }
    .type-icon.download   { background: var(--amber-bg);  border: 1px solid rgba(217,119,6,0.15); }
    .type-icon.deleted    { background: var(--red-bg);    border: 1px solid rgba(220,38,38,0.15); }
    .type-icon svg { width: 14px; height: 14px; }

    .item-body { flex: 1; min-width: 0; }

    .item-filename {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .item-filename.crossed { color: var(--muted2); text-decoration: line-through; }

    .item-source {
      font-size: 11px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .item-source a { color: var(--accent); transition: opacity 0.12s; }
    .item-source a:hover { opacity: 0.75; text-decoration: underline; }

    /* tags */
    .item-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }

    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .tag.t-shot  { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(13,148,136,0.15); }
    .tag.t-dl    { background: var(--amber-bg);  color: var(--amber);  border: 1px solid rgba(217,119,6,0.15); }
    .tag.t-time  { background: var(--surface2);  color: var(--muted);  border: 1px solid var(--border); }
    .tag.t-size  { background: var(--surface2);  color: var(--muted);  border: 1px solid var(--border); }
    .tag.t-mime  { background: var(--surface2);  color: var(--muted);  border: 1px solid var(--border); }

    .tag.t-deleted {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border);
      font-weight: 600;
      animation: redPulse 2s ease-in-out infinite;
    }

    @keyframes redPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.2); }
      50%       { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
    }

    /* actions */
    .item-actions {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .item-card:hover .item-actions { opacity: 1; }

    .act-btn {
      width: 27px;
      height: 27px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .act-btn svg { width: 12px; height: 12px; pointer-events: none; }
    .act-btn:hover { color: var(--text); border-color: var(--muted2); }
    .act-btn.pin:hover  { color: var(--amber); border-color: var(--amber);  background: var(--amber-bg); }
    .act-btn.copy:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
    .act-btn.del:hover  { color: var(--red);   border-color: var(--red);   background: var(--red-bg); }

    /* note */
    .note-area { margin-top: 7px; }

    .note-preview {
      display: inline-block;
      font-size: 11px;
      color: var(--muted2);
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px dashed var(--border);
      transition: all 0.15s;
    }

    .note-preview:hover { border-color: var(--muted2); color: var(--muted); }

    .note-preview.has-note {
      color: var(--amber);
      border-color: rgba(217,119,6,0.3);
      background: var(--amber-bg);
      border-style: solid;
    }

    .note-editor { display: none; margin-top: 6px; }
    .note-editor.open { display: block; }

    .note-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 12px;
      font-family: inherit;
      padding: 7px 9px;
      resize: vertical;
      min-height: 60px;
      outline: none;
      transition: border-color 0.15s;
    }

    .note-textarea:focus { border-color: var(--accent); }

    .note-btns {
      display: flex;
      gap: 5px;
      margin-top: 5px;
      justify-content: flex-end;
    }

    .note-save {
      font-size: 11px;
      padding: 4px 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .note-save:hover { background: #0f766e; }

    .note-cancel {
      font-size: 11px;
      padding: 4px 9px;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .note-cancel:hover { color: var(--text); }

    /* states */
    .loading-state, .empty-state {
      padding: 50px 20px;
      text-align: center;
      color: var(--muted2);
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state svg {
      width: 28px;
      height: 28px;
      opacity: 0.25;
      margin: 0 auto 8px;
      display: block;
    }

    .empty-state p { font-size: 13px; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 580px) {
      .shell { padding: 14px 12px 40px; }
      .search-row { flex-direction: column; }
      #filterSelect { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="topbar">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </button>
      <div class="topbar-right">
        <button class="top-btn" id="exportBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export CSV
        </button>
        <button class="top-btn danger" id="clearAllBtn">Clear tab</button>
      </div>
    </div>

    <div class="page-head">
      <div class="page-title">History</div>
      <div class="page-sub">Everything SmartShot has captured</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-type="screenshots">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        Screenshots
        <span class="tab-count" id="shotCount">0</span>
      </button>
      <button class="tab" data-type="downloads">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7,10 12,15 17,10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Downloads
        <span class="tab-count" id="dlCount">0</span>
      </button>
    </div>

    <div class="stats-strip" id="statsStrip"></div>

    <div class="search-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search filename, URL, site…" />
      </div>
      <select id="filterSelect">
        <option value="all">All fields</option>
        <option value="filename">Filename</option>
        <option value="url">URL</option>
        <option value="site">Site</option>
      </select>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>

    <div class="results-info" id="resultsInfo"></div>
    <div id="itemList">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading…</p>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="history.js"></script>
</body>
</html>
