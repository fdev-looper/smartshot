<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartShot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #f7f5f2;
      --surface:   #ffffff;
      --surface2:  #f0ede8;
      --border:    #e4dfd8;
      --text:      #1c1917;
      --muted:     #78716c;
      --muted2:    #a8a29e;
      --accent:    #0d9488;
      --accent-bg: #f0fdfb;
      --amber:     #d97706;
      --amber-bg:  #fffbeb;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    /* ---- header ---- */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 15px 11px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand img {
      width: 24px;
      height: 24px;
      border-radius: 5px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .brand-name span {
      font-size: 10px;
      font-weight: 400;
      color: var(--muted2);
      margin-left: 2px;
    }

    .history-btn {
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid rgba(13,148,136,0.2);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.15s;
    }

    .history-btn:hover {
      background: #ccfbf1;
    }

    /* ---- screenshot action ---- */
    .main-action {
      padding: 14px 15px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .shot-btn {
      width: 100%;
      padding: 10px 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, transform 0.1s;
      font-family: inherit;
    }

    .shot-btn:hover  { background: #0f766e; }
    .shot-btn:active { transform: scale(0.98); }

    .shot-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .shortcut-hint {
      text-align: center;
      margin-top: 7px;
      font-size: 11px;
      color: var(--muted2);
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: inherit;
      font-size: 10px;
      color: var(--muted);
    }

    /* ---- stats ---- */
    .stats {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      flex: 1;
      padding: 11px 0;
      text-align: center;
      cursor: pointer;
      transition: background 0.12s;
    }

    .stat:hover { background: var(--surface2); }
    .stat + .stat { border-left: 1px solid var(--border); }

    .stat-num {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ---- recent list ---- */
    .section-label {
      padding: 9px 15px 5px;
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--bg);
    }

    .recent-list {
      max-height: 190px;
      overflow-y: auto;
      background: var(--bg);
    }

    .recent-list::-webkit-scrollbar { width: 3px; }
    .recent-list::-webkit-scrollbar-track { background: transparent; }
    .recent-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 15px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      margin-bottom: 1px;
      transition: background 0.1s;
      cursor: default;
    }

    .item:hover { background: var(--surface2); }

    .item-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-icon.screenshot { background: var(--accent-bg); border: 1px solid rgba(13,148,136,0.15); }
    .item-icon.download   { background: var(--amber-bg);  border: 1px solid rgba(217,119,6,0.15); }
    .item-icon.deleted    { background: var(--red-bg);    border: 1px solid rgba(220,38,38,0.15); }

    .item-icon svg { width: 13px; height: 13px; }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }

    .item-name.deleted-name { color: var(--muted2); text-decoration: line-through; }

    .item-meta { font-size: 10px; color: var(--muted2); margin-top: 1px; }

    .deleted-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--red);
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.2);
      padding: 1px 6px;
      border-radius: 4px;
      animation: deletedPulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes deletedPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.25); }
      50%       { box-shadow: 0 0 0 4px rgba(220,38,38,0); }
    }

    .copy-url {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.12s;
      color: var(--muted2);
      flex-shrink: 0;
    }

    .item:hover .copy-url { opacity: 1; }
    .copy-url:hover { color: var(--accent); background: var(--accent-bg); }
    .copy-url svg { width: 12px; height: 12px; display: block; }

    /* ---- empty ---- */
    .empty {
      padding: 28px 15px;
      text-align: center;
      background: var(--surface);
    }

    .empty svg {
      width: 26px;
      height: 26px;
      margin: 0 auto 8px;
      display: block;
      color: var(--muted2);
      opacity: 0.5;
    }

    .empty p { font-size: 12px; color: var(--muted2); line-height: 1.5; }

    /* ---- toast ---- */
    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 5px 13px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- footer ---- */
    .footer {
      padding: 9px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .clear-btn {
      font-size: 11px;
      color: var(--muted2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--red); }

    .footer-right {
      font-size: 10px;
      color: var(--border);
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="brand">
      <img src="Smartshot logo.png" alt="" />
      <span class="brand-name">SmartShot <span>v1.0</span></span>
    </div>
    <a href="history.html" target="_blank" class="history-btn">View all</a>
  </div>

  <div class="main-action">
    <button class="shot-btn" id="shotBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      Take Screenshot
    </button>
    <p class="shortcut-hint">or press <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>S</kbd></p>
  </div>

  <div class="stats">
    <div class="stat" id="statShots" title="View screenshots">
      <div class="stat-num" id="countShots">0</div>
      <div class="stat-label">Screenshots</div>
    </div>
    <div class="stat" id="statDownloads" title="View downloads">
      <div class="stat-num" id="countDownloads">0</div>
      <div class="stat-label">Downloads</div>
    </div>
    <div class="stat" id="statToday">
      <div class="stat-num" id="countToday">0</div>
      <div class="stat-label">Today</div>
    </div>
  </div>

  <div class="section-label">Recent</div>
  <div class="recent-list" id="recentList"></div>

  <div class="footer">
    <button class="clear-btn" id="clearBtn">Clear all history</button>
    <span class="footer-right">stored locally</span>
  </div>

  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
